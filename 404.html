<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Target Not Found | Rajendra Singh</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#030712;--card:#080f1e;--cyan:#00E5FF;--purple:#7C3AED;--text:#E2E8F0;--muted:#64748B;--border:rgba(0,229,255,0.14)}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.wrap{max-width:560px;width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 0 60px rgba(0,229,255,.06),0 24px 64px rgba(0,0,0,.6)}
.bar{display:flex;align-items:center;gap:.5rem;padding:.75rem 1.1rem;background:#0a1225;border-bottom:1px solid var(--border)}
.bar span{width:11px;height:11px;border-radius:50%}
.bar span:nth-child(1){background:#FF5F56}
.bar span:nth-child(2){background:#FFBD2E}
.bar span:nth-child(3){background:#27C93F}
.bar-title{margin-left:.5rem;font-size:.72rem;color:var(--muted)}
.body{padding:2rem 1.7rem;line-height:1.9;font-size:.85rem}
.code{font-family:'Space Grotesk',sans-serif;font-size:3.2rem;font-weight:700;color:var(--cyan);text-shadow:0 0 30px rgba(0,229,255,.4);line-height:1}
.line{margin:.15rem 0}
.accent{color:var(--cyan)}
.purple{color:var(--purple)}
.err{color:#F87171}
a.home{display:inline-flex;align-items:center;gap:.4rem;margin-top:1.3rem;color:var(--bg);background:var(--cyan);text-decoration:none;font-weight:600;padding:.6rem 1.1rem;border-radius:6px;font-size:.78rem;transition:opacity .2s}
a.home:hover{opacity:.85}
.prompt{color:var(--purple)}
</style>
</head>
<body>
<div class="wrap">
  <div class="bar"><span></span><span></span><span></span><span class="bar-title">rs@sec:~ — 404</span></div>
  <div class="body">
    <div class="code">404</div>
    <p class="line"><span class="prompt">rs@sec:~$</span> curl <span class="accent">this-page</span></p>
    <p class="line err">✗ Target not found — connection refused</p>
    <p class="line">[ <span class="accent">Status:</span> Resource does not exist on this host ]</p>
    <p class="line" style="color:var(--muted)">The page you're scanning for has moved, been removed, or never existed.</p>
    <a class="home" href="/Portfolio/">← Back to safe zone</a>
  </div>
</div>
</body>
</html>
