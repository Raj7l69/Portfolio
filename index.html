<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rajendra Singh — Offensive Security & VAPT</title>
<meta name="description" content="Cybersecurity student specializing in VAPT, penetration testing, and offensive security. TryHackMe Top 4% Global.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#030712;--card:#080f1e;--card2:#0a1225;
  --cyan:#00E5FF;--cyan-dim:rgba(0,229,255,0.15);
  --purple:#7C3AED;--purple-light:#A78BFA;
  --text:#E2E8F0;--muted:#64748B;--border:rgba(0,229,255,0.14);
  --font-display:'Space Grotesk',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --glow-cyan:0 0 20px rgba(0,229,255,.35),0 0 60px rgba(0,229,255,.12);
  --glow-purple:0 0 20px rgba(124,58,237,.35),0 0 60px rgba(124,58,237,.1);
}
.hacker-mode{
  --bg:#000500;--card:#000d00;--card2:#001000;
  --cyan:#00FF41;--cyan-dim:rgba(0,255,65,0.12);
  --purple:#00CC33;--purple-light:#00FF41;
  --text:#00FF41;--muted:#005500;--border:rgba(0,255,65,0.18);
}
/* HACKER MODE EXTRAS */
.hacker-mode body{font-family:var(--font-mono)}
.hacker-mode .hero-name{text-shadow:0 0 30px rgba(0,255,65,.5),0 0 60px rgba(0,255,65,.2)}
.hacker-mode .section-title .accent{text-shadow:0 0 20px rgba(0,255,65,.6)}
.hacker-mode .ach-num{text-shadow:0 0 25px rgba(0,255,65,.6)}
.hacker-mode nav{background:rgba(0,5,0,.95);border-bottom-color:rgba(0,255,65,.2)}
.hacker-mode .project-card,.hacker-mode .skill-card,.hacker-mode .whatido-card,.hacker-mode .exp-card,.hacker-mode .cert-card{border-color:rgba(0,255,65,.15)}
.hacker-mode .project-card:hover,.hacker-mode .skill-card:hover,.hacker-mode .whatido-card:hover{border-color:rgba(0,255,65,.5);box-shadow:0 0 30px rgba(0,255,65,.12),0 12px 40px rgba(0,0,0,.6)}
.hacker-mode .btn-primary{background:#00FF41;color:#000500;box-shadow:0 0 25px rgba(0,255,65,.4)}
.hacker-mode .btn-outline{color:#00FF41;border-color:rgba(0,255,65,.4)}
.hacker-mode .terminal-window{box-shadow:0 0 60px rgba(0,255,65,.08),0 24px 64px rgba(0,0,0,.8)}
.hacker-mode .tag-cyan{background:rgba(0,255,65,.08);color:#00FF41;border-color:rgba(0,255,65,.2)}
.hacker-mode .tag-purple{background:rgba(0,204,51,.08);color:#00CC33;border-color:rgba(0,204,51,.2)}
.hacker-mode #scroll-progress{background:linear-gradient(90deg,#00FF41,#00CC33,#00FF41)}
.hacker-mode .side-dot.active{background:#00FF41;border-color:#00FF41;box-shadow:0 0 14px rgba(0,255,65,.8)}
.hacker-mode .currently-learning{background:rgba(0,255,65,.04);border-color:rgba(0,255,65,.15)}
.hacker-mode .exp-dot{border-color:#00FF41;box-shadow:0 0 16px rgba(0,255,65,.6)}
.hacker-mode .hero-badge{box-shadow:0 0 20px rgba(0,255,65,.12);border-color:rgba(0,255,65,.3)}
.hacker-mode footer::before{background:linear-gradient(90deg,transparent,#00FF41,#00CC33,transparent)}
/* Scanlines always on in hacker mode */
.hacker-mode::after{opacity:.6!important}
/* Green cursor */
.hacker-mode #cursor-dot{background:#00FF41}
.hacker-mode #cursor-ring{border-color:rgba(0,255,65,.5)}
.hacker-mode #cursor-ring.hovering{border-color:#00FF41;background:rgba(0,255,65,.05)}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);line-height:1.6;overflow-x:hidden;transition:background .4s,color .4s}
body.no-scroll{overflow:hidden}

/* SCROLLBAR */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--cyan);border-radius:2px}

/* CUSTOM CURSOR */
*,*::before,*::after{cursor:none!important}
#cursor-dot{width:6px;height:6px;background:var(--cyan);border-radius:50%;position:fixed;transform:translate(-50%,-50%);z-index:9999;pointer-events:none;transition:transform .1s}
#cursor-ring{width:32px;height:32px;border:1.5px solid rgba(0,229,255,.5);border-radius:50%;position:fixed;transform:translate(-50%,-50%);transition:all .12s ease;z-index:9998;pointer-events:none}
#cursor-ring.hovering{width:46px;height:46px;border-color:var(--cyan);background:rgba(0,229,255,.05)}
#cursor-ring.clicking{transform:translate(-50%,-50%) scale(.85)}

/* SCROLL PROGRESS */
#scroll-progress{position:fixed;top:0;left:0;height:2px;width:0%;background:linear-gradient(90deg,var(--cyan),var(--purple),var(--cyan));background-size:200%;z-index:200;animation:shimmer 3s linear infinite}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}

/* LOADER */
#loader{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;transition:opacity .6s}
#loader.done{opacity:0;pointer-events:none}
.loader-logo{font-family:var(--font-mono);font-size:1.4rem;font-weight:700;color:var(--cyan);letter-spacing:.08em}
.loader-text{font-family:var(--font-mono);font-size:.75rem;color:var(--muted);letter-spacing:.15em}
.loader-bar-wrap{width:220px;height:2px;background:var(--border);border-radius:2px;overflow:hidden}
.loader-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--cyan),var(--purple));border-radius:2px;animation:load 1.2s ease forwards}
@keyframes load{to{width:100%}}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:1rem 5%;background:rgba(7,11,22,.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);transition:background .4s}
.nav-logo{font-family:var(--font-mono);font-weight:700;font-size:.95rem;color:var(--cyan);text-decoration:none;letter-spacing:.05em;display:flex;align-items:center;gap:.5rem}
.nav-logo-dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);animation:pulse 2s ease infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.nav-right{display:flex;align-items:center;gap:1.8rem}
.nav-links{display:flex;gap:1.8rem;list-style:none}
.nav-links a{font-family:var(--font-mono);font-size:.72rem;color:var(--muted);text-decoration:none;letter-spacing:.08em;text-transform:uppercase;transition:color .2s;position:relative}
.nav-links a::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:1px;background:var(--cyan);transform:scaleX(0);transition:transform .2s}
.nav-links a:hover,.nav-links a.active{color:var(--cyan)}
.nav-links a.active::after{transform:scaleX(1)}
.hacker-toggle{font-family:var(--font-mono);font-size:.65rem;color:var(--muted);background:transparent;border:1px solid var(--border);padding:.28rem .65rem;border-radius:3px;letter-spacing:.08em;text-transform:uppercase;transition:all .2s}
.hacker-toggle:hover,.hacker-toggle.on{color:var(--cyan);border-color:var(--cyan);background:var(--cyan-dim)}
.hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;padding:4px}
.hamburger span{display:block;width:22px;height:2px;background:var(--cyan);border-radius:2px;transition:all .3s}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

/* MOBILE MENU */
.mobile-menu{display:none;position:fixed;top:57px;left:0;right:0;background:rgba(7,11,22,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);z-index:99;padding:1.2rem 5%;flex-direction:column;gap:1.2rem}
.mobile-menu.open{display:flex}
.mobile-menu a{font-family:var(--font-mono);font-size:.82rem;color:var(--muted);text-decoration:none;letter-spacing:.1em;text-transform:uppercase;transition:color .2s}
.mobile-menu a:hover{color:var(--cyan)}

/* BACK TO TOP */
#back-top{position:fixed;bottom:2rem;right:2rem;z-index:99;width:40px;height:40px;border-radius:50%;background:var(--card);border:1px solid var(--border);color:var(--cyan);font-size:1rem;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:all .3s}
#back-top.show{opacity:1;pointer-events:all}
#back-top:hover{background:var(--cyan-dim);border-color:var(--cyan);transform:translateY(-3px)}

/* COPY TOAST */
#copy-toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%) translateY(10px);background:var(--card);border:1px solid var(--cyan);color:var(--cyan);font-family:var(--font-mono);font-size:.72rem;padding:.5rem 1.2rem;border-radius:4px;opacity:0;pointer-events:none;transition:all .3s;z-index:500;letter-spacing:.08em}
#copy-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* SHORTCUT HINT */
#key-hint{position:fixed;bottom:2rem;left:2rem;z-index:99;font-family:var(--font-mono);font-size:.65rem;color:var(--muted);background:var(--card);border:1px solid var(--border);padding:.3rem .7rem;border-radius:3px;letter-spacing:.08em;opacity:0;animation:fadeInDelay 1s 3s forwards}
@keyframes fadeInDelay{to{opacity:1}}
@keyframes flashOut{0%{opacity:1}100%{opacity:0}}
@keyframes ripple{0%{transform:scale(0);opacity:1}100%{transform:scale(40);opacity:0}}
#key-hint kbd{color:var(--cyan)}

/* SECTION DIVIDER */
.section-divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),var(--purple),transparent);opacity:.2}

/* HERO */
#hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:8rem 5% 5rem;position:relative;overflow:hidden}
#matrix-canvas{position:absolute;inset:0;z-index:0;opacity:.065}
.hero-grid-bg{position:absolute;inset:0;z-index:0;background-image:linear-gradient(rgba(0,229,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.02) 1px,transparent 1px);background-size:60px 60px}
.hero-noise{position:absolute;inset:0;z-index:0;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");background-size:200px}
.hero-glow{position:absolute;top:15%;left:20%;width:800px;height:800px;background:radial-gradient(circle,rgba(0,229,255,.1) 0%,rgba(0,229,255,.04) 35%,transparent 65%);pointer-events:none;z-index:0;transition:transform .15s ease-out}
.hero-glow-2{position:absolute;bottom:5%;right:5%;width:600px;height:600px;background:radial-gradient(circle,rgba(124,58,237,.12) 0%,rgba(124,58,237,.04) 40%,transparent 65%);pointer-events:none;z-index:0}
.hero-glow-3{position:absolute;bottom:30%;left:5%;width:400px;height:400px;background:radial-gradient(circle,rgba(0,229,255,.05) 0%,transparent 65%);pointer-events:none;z-index:0}
.hero-content{position:relative;z-index:1;max-width:900px}

.hero-badge{display:inline-flex;align-items:center;gap:.5rem;font-family:var(--font-mono);font-size:.7rem;color:var(--cyan);background:var(--cyan-dim);border:1px solid rgba(0,229,255,.25);padding:.3rem .9rem;border-radius:100px;margin-bottom:1.6rem;letter-spacing:.1em;text-transform:uppercase}
.hero-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);animation:pulse 1.5s ease infinite}

.hero-terminal-line{font-family:var(--font-mono);font-size:.88rem;color:var(--cyan);margin-bottom:1.8rem;display:flex;align-items:center;gap:.5rem}
.term-prompt-sym{color:var(--purple-light)}
.type-cursor{display:inline-block;width:9px;height:1em;background:var(--cyan);vertical-align:middle;animation:blink 1s step-end infinite;margin-left:2px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.hero-name{font-family:var(--font-display);font-size:clamp(3rem,7.5vw,6rem);font-weight:700;line-height:1.05;letter-spacing:-.02em;margin-bottom:.7rem}
.hero-name .accent{color:var(--cyan);display:inline-block;position:relative}
.hero-name .accent::after{content:attr(data-text);position:absolute;left:2px;top:2px;color:var(--purple);opacity:.3;z-index:-1;pointer-events:none}

.hero-title{font-family:var(--font-display);font-size:clamp(1rem,2.5vw,1.3rem);font-weight:400;color:var(--muted);margin-bottom:1.6rem}
.hero-title span{color:var(--purple-light);font-weight:500}
.hero-desc{font-size:1rem;color:#94A3B8;max-width:580px;line-height:1.8;margin-bottom:2.5rem}

.hero-cta{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:2.5rem}
.btn{font-family:var(--font-mono);font-size:.78rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:.75rem 1.6rem;border-radius:4px;text-decoration:none;transition:all .2s;display:inline-flex;align-items:center;gap:.5rem}
.btn-primary{background:var(--cyan);color:#070B16}
.btn-primary:hover{filter:brightness(1.15);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,229,255,.25)}
.btn-outline{background:transparent;color:var(--cyan);border:1px solid rgba(0,229,255,.4)}
.btn-outline:hover{background:var(--cyan-dim);transform:translateY(-2px);border-color:var(--cyan)}

.status-pills{display:flex;gap:.75rem;flex-wrap:wrap}
.status-pill{display:flex;align-items:center;gap:.5rem;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.55rem 1rem;font-family:var(--font-mono);font-size:.7rem;transition:border-color .2s}
.status-pill:hover{border-color:rgba(0,229,255,.25)}
.pill-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;animation:pulse 2s infinite}
.pill-dot.green{background:#4ADE80}
.pill-dot.yellow{background:#FBBF24}
.pill-dot.cyan{background:var(--cyan)}
.pill-label{color:var(--muted)}
.pill-val{color:var(--text);font-weight:500}

/* SECTION COMMON */
section{padding:6rem 5%}
.section-label{font-family:var(--font-mono);font-size:.7rem;color:var(--cyan);text-transform:uppercase;letter-spacing:.18em;margin-bottom:.5rem}
.section-title{font-family:var(--font-display);font-size:clamp(1.8rem,4vw,2.8rem);font-weight:700;line-height:1.15;margin-bottom:3rem}
.section-title .accent{color:var(--cyan)}

/* WHAT I DO */
#whatido{background:var(--card2)}
.whatido-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.2rem}
.whatido-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:2rem;transition:all .3s;position:relative;overflow:hidden}
.whatido-card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s;border-radius:12px}
.whatido-card.c1::before{background:linear-gradient(135deg,rgba(0,229,255,.04),transparent)}
.whatido-card.c2::before{background:linear-gradient(135deg,rgba(124,58,237,.05),transparent)}
.whatido-card.c3::before{background:linear-gradient(135deg,rgba(74,222,128,.04),transparent)}
.whatido-card:hover{transform:translateY(-6px);box-shadow:0 16px 48px rgba(0,0,0,.4)}
.whatido-card.c1:hover{border-color:rgba(0,229,255,.5);box-shadow:0 0 30px rgba(0,229,255,.12),0 16px 48px rgba(0,0,0,.4)}
.whatido-card.c2:hover{border-color:rgba(124,58,237,.55);box-shadow:0 0 30px rgba(124,58,237,.14),0 16px 48px rgba(0,0,0,.4)}
.whatido-card.c3:hover{border-color:rgba(74,222,128,.5);box-shadow:0 0 30px rgba(74,222,128,.12),0 16px 48px rgba(0,0,0,.4)}
.whatido-card:hover::before{opacity:1}
.whatido-number{font-family:var(--font-mono);font-size:.65rem;color:var(--muted);letter-spacing:.15em;margin-bottom:1.2rem}
.whatido-icon{font-size:2rem;margin-bottom:1rem;display:block}
.whatido-title{font-family:var(--font-display);font-size:1.1rem;font-weight:600;margin-bottom:.7rem}
.whatido-card.c1 .whatido-title{color:var(--cyan)}
.whatido-card.c2 .whatido-title{color:var(--purple-light)}
.whatido-card.c3 .whatido-title{color:#4ADE80}
.whatido-desc{font-size:.85rem;color:#94A3B8;line-height:1.65}
.whatido-tags{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:1.2rem}

/* TERMINAL WIDGET */
#terminal-section{background:var(--bg)}
.terminal-window{max-width:860px;margin:0 auto;background:#030610;border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 0 60px rgba(0,229,255,.05),0 24px 64px rgba(0,0,0,.6)}
.terminal-bar{display:flex;align-items:center;gap:.5rem;padding:.75rem 1.1rem;background:var(--card);border-bottom:1px solid var(--border)}
.terminal-dots{display:flex;gap:.4rem}
.terminal-dots span{width:11px;height:11px;border-radius:50%;display:block}
.terminal-dots span:nth-child(1){background:#FF5F56}
.terminal-dots span:nth-child(2){background:#FFBD2E}
.terminal-dots span:nth-child(3){background:#27C93F}
.terminal-bar-title{font-family:var(--font-mono);font-size:.73rem;color:var(--muted);margin-left:.4rem}
.terminal-body{font-family:var(--font-mono);font-size:.82rem;line-height:1.75;padding:1.3rem 1.5rem;height:300px;overflow-y:auto;color:#94A3B8}
.term-line{white-space:pre-wrap;word-break:break-word;margin-bottom:.2rem}
.term-cmd{color:var(--cyan)}
.term-cmd::before{content:'rs@sec:~$ ';color:var(--purple-light)}
.term-output{color:#94A3B8;padding-left:.6rem;border-left:2px solid var(--border);margin:.3rem 0 .6rem}
.term-accent{color:var(--cyan);font-weight:600}
.term-error{color:#F87171}
.term-success{color:#4ADE80}
.terminal-input-row{display:flex;align-items:center;gap:.6rem;padding:.85rem 1.5rem;border-top:1px solid var(--border)}
.terminal-input-row .prompt-sym{color:var(--purple-light);flex-shrink:0;font-family:var(--font-mono);font-size:.82rem}
.terminal-input{flex:1;background:transparent;border:none;outline:none;color:var(--cyan);font-family:var(--font-mono);font-size:.82rem;caret-color:var(--cyan)}
.terminal-hint{font-family:var(--font-mono);font-size:.71rem;color:var(--muted);margin-top:1rem;text-align:center;line-height:2}
.terminal-hint span{color:var(--cyan);text-decoration:underline dotted;transition:color .15s}
.terminal-hint span:hover{color:#fff}

/* SKILLS */
#skills{background:var(--card2)}
.skills-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.2rem}
.skill-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.5rem 1.6rem;transition:all .25s;position:relative;overflow:hidden}
.skill-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,229,255,.03),transparent);opacity:0;transition:opacity .25s}
.skill-card:hover{border-color:rgba(0,229,255,.45);transform:translateY(-4px);box-shadow:0 0 25px rgba(0,229,255,.1),0 10px 36px rgba(0,0,0,.35)}
.skill-card:hover::before{opacity:1}
.skill-card-icon{font-size:1.3rem;margin-bottom:.7rem}
.skill-card-title{font-family:var(--font-mono);font-size:.68rem;color:var(--purple-light);text-transform:uppercase;letter-spacing:.14em;margin-bottom:1rem}
.skill-tags{display:flex;flex-wrap:wrap;gap:.45rem}
.tag{font-family:var(--font-mono);font-size:.7rem;padding:.28rem .65rem;border-radius:3px;font-weight:500}
.tag-cyan{background:rgba(0,229,255,.08);color:var(--cyan);border:1px solid rgba(0,229,255,.18)}
.tag-purple{background:rgba(124,58,237,.1);color:var(--purple-light);border:1px solid rgba(124,58,237,.18)}
.tag-gray{background:rgba(100,116,139,.12);color:#94A3B8;border:1px solid rgba(100,116,139,.18)}
.tag-green{background:rgba(74,222,128,.08);color:#4ADE80;border:1px solid rgba(74,222,128,.18)}

/* SKILL BARS */
.skill-bars-wrap{margin-top:3.5rem;max-width:680px}
.skill-bars-title{font-family:var(--font-display);font-size:1rem;font-weight:600;color:var(--muted);margin-bottom:1.5rem;letter-spacing:-.01em}
.skill-bars{display:flex;flex-direction:column;gap:.7rem}
.skill-bar-row{display:flex;align-items:center;gap:.8rem}
.skill-bar-label{font-family:var(--font-mono);font-size:.68rem;color:#94A3B8;width:90px;flex-shrink:0}
.skill-bar-track{flex:1;height:4px;background:rgba(0,229,255,.08);border-radius:2px;overflow:hidden}
.skill-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--cyan),var(--purple-light));width:0%;transition:width 1.1s cubic-bezier(.4,0,.2,1)}
.skill-bar-pct{font-family:var(--font-mono);font-size:.62rem;color:var(--cyan);wi
